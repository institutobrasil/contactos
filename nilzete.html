<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nilzete Pacheco · Instituto Brasil</title>
<style>
  :root{
    --azul:#1f5fa6;
    --azul-escuro:#16406f;
    --verde:#3aa657;
    --amarelo:#f3c41a;
    --texto:#1f2937;
    --suave:#6b7280;
    --linha:#eceff3;
    --fundo:#f4f6f9;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  body{
    font-family:'Segoe UI',Helvetica,Arial,sans-serif;
    background:var(--fundo);
    min-height:100vh;
    display:flex;align-items:center;justify-content:center;
    padding:22px;color:var(--texto);
  }
  .card{
    width:100%;max-width:380px;background:#fff;
    border-radius:20px;overflow:hidden;
    box-shadow:0 12px 40px rgba(22,64,111,.12);
    border:1px solid var(--linha);
  }
  .accent{height:5px;background:linear-gradient(90deg,var(--azul) 0%,var(--azul) 40%,var(--verde) 40%,var(--verde) 70%,var(--amarelo) 70%,var(--amarelo) 85%,#d8332f 85%)}
  .logo-wrap{text-align:center;padding:24px 28px 8px}
  .logo-wrap img{width:168px;height:auto}
  .top{padding:6px 28px 22px;text-align:center;border-bottom:1px solid var(--linha)}
  .photo{
    width:108px;height:108px;border-radius:50%;object-fit:cover;
    margin:6px auto 14px;display:block;
    border:3px solid #fff;box-shadow:0 4px 16px rgba(22,64,111,.18);
  }
  .name{font-size:23px;font-weight:700;color:var(--azul-escuro);margin-bottom:4px}
  .role{
    display:inline-block;font-size:12px;font-weight:600;letter-spacing:.4px;
    color:var(--azul);background:rgba(31,95,166,.08);
    padding:4px 12px;border-radius:20px;
  }
  .rows{padding:10px 22px}
  .row{
    display:flex;align-items:center;gap:14px;
    padding:13px 6px;border-bottom:1px solid var(--linha);
    color:var(--texto);text-decoration:none;font-size:14px;
  }
  .row:last-child{border-bottom:none}
  .ico{
    width:36px;height:36px;flex:0 0 36px;border-radius:10px;
    background:rgba(31,95,166,.08);color:var(--azul);
    display:flex;align-items:center;justify-content:center;font-size:16px;
  }
  .row small{display:block;font-size:10px;letter-spacing:.8px;text-transform:uppercase;color:var(--suave);margin-bottom:1px}
  .row span span,.row span{word-break:break-all}
  .actions{padding:16px 22px 24px;display:grid;gap:11px}
  .btn{
    display:flex;align-items:center;justify-content:center;gap:9px;
    padding:15px;border-radius:12px;font-weight:600;font-size:15px;
    text-decoration:none;cursor:pointer;border:none;
    transition:transform .12s ease,box-shadow .12s ease;
  }
  .btn:active{transform:scale(.98)}
  .btn-main{background:var(--azul);color:#fff;box-shadow:0 6px 16px rgba(31,95,166,.28)}
  .btn-wa{background:#25d366;color:#fff}
  .btn-site{background:#fff;color:var(--azul);border:1.5px solid var(--linha)}
  .foot{text-align:center;font-size:10px;letter-spacing:.6px;color:var(--suave);padding:0 22px 20px}
</style>
</head>

  function baixarVCard(){
    const vcf =
"BEGIN:VCARD\n"+
"VERSION:3.0\n"+
"N:"+dados.apelido+";"+dados.primeiroNome+";;;\n"+
"FN:"+dados.primeiroNome+" "+dados.apelido+"\n"+
"ORG:"+dados.organizacao+"\n"+
"TITLE:"+dados.cargo+"\n"+
"EMAIL;TYPE=WORK:"+dados.email+"\n"+
"TEL;TYPE=CELL:"+dados.telefone+"\n"+
"URL:"+dados.website+"\n"+
"END:VCARD";
    const blob = new Blob([vcf], {type:"text/vcard;charset=utf-8"});
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url; a.download = dados.primeiroNome + "_" + dados.apelido + ".vcf";
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    URL.revokeObjectURL(url);
  }
