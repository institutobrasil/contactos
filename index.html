<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Instituto Brasil · Contactos</title>
<style>
  :root{--azul:#1f5fa6;--azul-escuro:#16406f;--verde:#3aa657;--amarelo:#f3c41a;--texto:#1f2937;--suave:#6b7280;--linha:#eceff3;--fundo:#f4f6f9}
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:'Segoe UI',Helvetica,Arial,sans-serif;background:var(--fundo);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:22px;color:var(--texto)}
  .card{width:100%;max-width:380px;background:#fff;border-radius:20px;overflow:hidden;box-shadow:0 12px 40px rgba(22,64,111,.12);border:1px solid var(--linha)}
  .accent{height:5px;background:linear-gradient(90deg,var(--azul) 0%,var(--azul) 40%,var(--verde) 40%,var(--verde) 70%,var(--amarelo) 70%,var(--amarelo) 85%,#d8332f 85%)}
  .logo-wrap{text-align:center;padding:26px 28px 10px}
  .logo-wrap img{width:172px;height:auto}
  h1{font-size:16px;text-align:center;color:var(--azul-escuro);padding:0 28px 4px}
  .sub{text-align:center;font-size:12px;color:var(--suave);padding:0 28px 18px}
  .links{padding:6px 22px 26px;display:grid;gap:12px}
  .person{display:flex;align-items:center;gap:14px;padding:14px;border:1px solid var(--linha);border-radius:14px;text-decoration:none;color:var(--texto);transition:box-shadow .15s}
  .person:hover{box-shadow:0 6px 18px rgba(22,64,111,.12)}
  .person img{width:54px;height:54px;border-radius:50%;object-fit:cover}
  .person b{display:block;color:var(--azul-escuro);font-size:15px}
  .person small{color:var(--azul);font-size:12px;font-weight:600}
  .arrow{margin-left:auto;color:var(--azul);font-size:20px}
</style>
